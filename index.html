                        <img src="logo-skst.png" alt="SKST Logo" class="logo-sig" id="logoSKSTForm">

                    <!-- Tombol Kembali -->

                <form id="registForm" onsubmit="handleFormSubmit(event)">

                    </div>

                    <div class="input-group">

                        <select id="unitKerja" name="unitKerja" required>

                            <option value="KOMISARIAT ENGINEERING, PROJECT MANAGEMENT & TPM">KOMISARIAT ENGINEERING, PROJECT MANAGEMENT & TPM</option>
                            <option value="KOMISARIAT WORKSHOP & MAINTENANCE PLANNING">KOMISARIAT WORKSHOP & MAINTENANCE PLANNING</option>
                            <option value="KOMISARIAT OPERASI BTG">KOMISARIAT OPERASI BTG</option>
                            <option value="KOMISARIAT PEM.MESIN BTG & CUS">KOMISARIAT PEM.MESIN BTG & CUS</option>
                            <option value="KOMISARIAT PEM. ELINS BTG & DISTRIBUSI DAYA">KOMISARIAT PEM. ELINS BTG & DISTRIBUSI DAYA</option>
                            <option value="KOMISARIAT TAMBANG">KOMISARIAT TAMBANG</option>
                            <option value="KOMISARIAT BAHAN BAKU">KOMISARIAT BAHAN BAKU</option>
                            <option value="KOMISARIAT PEMELIHARAAN MESIN 1">KOMISARIAT PEMELIHARAAN MESIN 1</option>
                            <option value="KOMISARIAT PEMELIHARAAN MESIN 2">KOMISARIAT PEMELIHARAAN MESIN 2</option>
                            <option value="KOMISARIAT PEMELIHARAAN ELINS 1">KOMISARIAT PEMELIHARAAN ELINS 1</option>
                            <option value="KOMISARIAT PEMELIHARAAN ELINS 2">KOMISARIAT PEMELIHARAAN ELINS 2</option>
                            <option value="KOMISARIAT PGO & MAINTENANCE INSPECTION">KOMISARIAT PGO & MAINTENANCE INSPECTION</option>
                            <option value="KOMISARIAT TROUBLESHOOTING">KOMISARIAT TROUBLESHOOTING</option>
                            <option value="KOMISARIAT QUALITY ASSURANCE">KOMISARIAT QUALITY ASSURANCE</option>

                            <option value="Komisariat RKC 4">Komisariat RKC 4</option>
                            <option value="Komisariat RKC 5">Komisariat RKC 5</option>
                            <option value="Komisariat Cement Mill">Komisariat Cement Mill</option>
                            <option value="KOMISARIAT PEP & PRODUCTION SUPPORT">KOMISARIAT PEP & PRODUCTION SUPPORT</option>
                            <option value="KOMISARIAT OHS & AFR">KOMISARIAT OHS & AFR</option>
                            <option value="KOMISARIAT QUALITY CONTROL">KOMISARIAT QUALITY CONTROL</option>
                            <option value="KOMISARIAT PEMASARAN 1">KOMISARIAT PEMASARAN 1</option>

                    <div class="input-group">

                    <button type="submit" id="submitBtn" class="action-btn">

        <!-- ============================================== -->
        <!-- SCREEN 3: SUCCESS PAGE                         -->
        <!-- ============================================== -->

                    <!-- Logo Tonasa dan SKST -->

                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>

                        </svg>
                    </div>
                    <h2>ANDA SUDAH TERDAFTAR</h2>
                    <p>Terima kasih atas partisipasi Anda pada acara Ramah Tamah HUT ke-27 Serikat Karyawan Semen Tonasa.</p>
                    
                    <button type="button" class="action-btn" style="margin-top:20px;" onclick="showScreen('landingScreen');">Selesai</button>

    <!-- LOGIKA JAVASCRIPT FRONT-END -->
    <script>
        // Navigasi antar halaman (screeen)
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(function(el) {
                el.classList.remove('active');
            });
            document.getElementById(screenId).classList.add('active');
            window.scrollTo(0, 0); // Gulir ke atas ketika pindah layar
        }

        // Pengolahan File menjadi Base64 (dengan kompresi gambar otomatis)
        function getFileData(fileInput) {
            return new Promise((resolve, reject) => {
                if (!fileInput || !fileInput.files || fileInput.files.length === 0) {
                    resolve(null);
                    return;
                }
                var file = fileInput.files[0];

                // Jika file BUKAN gambar (misalnya PDF), gunakan ukuran maks 5MB tanpa kompresi
                if (!file.type.startsWith('image/')) {
                    if (file.size > 5 * 1024 * 1024) {
                        reject(new Error("Untuk file dokumen/PDF, ukuran maksimal adalah 5MB."));
                        return;
                    }
                    var reader = new FileReader();
                    reader.onload = function(e) {
                        resolve({
                            data: e.target.result.split(',')[1],
                            mimeType: file.type,
                            filename: file.name
                        });
                    };
                    reader.onerror = function(error) {
                        reject(error);
                    };
                    reader.readAsDataURL(file);
                    return;
                }

                // Jika file GAMBAR, lakukan kompresi menggunakan Canvas API
                var reader = new FileReader();
                reader.onload = function(e) {
                    var img = new Image();
                    img.onload = function() {
                        var canvas = document.createElement('canvas');
                        var ctx = canvas.getContext('2d');
                        
                        // Menentukan resolusi maksimal (misal 1024px)
                        var MAX_WIDTH = 1024;
                        var MAX_HEIGHT = 1024;
                        var width = img.width;
                        var height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                        } else {
                            if (height > MAX_HEIGHT) {
                                width *= MAX_HEIGHT / height;
                                height = MAX_HEIGHT;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;

                        // Gambar ulang di canvas
                        ctx.drawImage(img, 0, 0, width, height);

                        // Konversi ke base64 (jpeg dengan kualitas 0.7)
                        var dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                        
                        resolve({
                            data: dataUrl.split(',')[1],
                            mimeType: 'image/jpeg',
                            filename: file.name
                        });
                    };
                    img.onerror = function() {
                        reject(new Error("Gagal membaca file gambar"));
                    }
                    img.src = e.target.result;
                };
                reader.onerror = function(error) {
                    reject(error);
                };
                reader.readAsDataURL(file);
            });
        }

        async function handleFormSubmit(event) {
            event.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnLoading = document.getElementById('btnLoading');
            const notif = document.getElementById('notification');
            
            btn.disabled = true;
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');
            notif.classList.add('hidden');
            notif.className = 'notification hidden';

            try {
                const payload = {
                    namaKaryawan: document.getElementById('namaKaryawan').value,
                    nomorSAP: document.getElementById('nomorSAP').value,
                    unitKerja: document.getElementById('unitKerja').value,
                    pesanKesan: document.getElementById('pesanKesan').value,
                    fileData: await getFileData(document.getElementById('buktiKehadiran'))
                };
                
                // Mengirim data ke Google Apps Script via POST (Fetch API)
                const GAS_URL = 'https://script.google.com/macros/s/AKfycbz5vflqx7MpLv6jZURPE5ffeMLoYLtSH2bpm1A_gz_JH4hx-Aw-Xhcbv9zcXwMZscqD/exec';
                
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload),
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8'
                    }
                });
                
                const result = await response.json();

                if(result.success) {
                    // FORM BERHASIL => PINDAH KE SUCCESS SCREEN
                    document.getElementById('registForm').reset();
                    showScreen('successScreen');
                } else {
                    btn.disabled = false;
                    btnText.classList.remove('hidden');
                    btnLoading.classList.add('hidden');
                    notif.classList.remove('hidden');
                    notif.textContent = "Error: " + result.message;
                    notif.classList.add('error');
                }
                    
            } catch (err) {
                btn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
                notif.classList.remove('hidden');
                
                // Tangani error spesifik dari browser saat koneksi ke server gagal
                if (err.message === "Failed to fetch") {
                    notif.textContent = "Error: Gagal terhubung ke server. Pastikan koneksi internet stabil atau coba gunakan file ukuran lebih kecil.";
                } else {
                    notif.textContent = "Error: " + err.message;
                }
                notif.classList.add('error');
            }
        }
    </script>
</body>
